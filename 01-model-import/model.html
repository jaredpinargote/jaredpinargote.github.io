<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>LDS VR Group Example 1</title>
    <meta name="description" content="Hello, World! - A-Frame">
    <script src="https://aframe.io/releases/0.7.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-html-shader@0.2.0/dist/aframe-html-shader.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <!-- <img id="my-image" src="christ.jpg"> -->
        <img id="sky" src="./sky.jpg">
        <a-asset-item id="temple" src="./dc_temple.obj"></a-asset-item>
        <a-asset-item id="christus" src="./christus_seesaw00.obj"></a-asset-item>
      </a-assets>
      <!-- <a-entity position="-0.164 1.084 -3.841" text="value:Technology has blessed us with many new innovations to spread the message of the gospel through satellite systems, our own network Web site, television, radio, as well as the written text in our magazines and newspaper. All of these add to our delivery systems, which greatly increase our ability to receive the messages that are delivered.\n
      But the bricks and mortar and the continued expansion of technology will only bring the messages to us. One challenge remains the same from the time of King Benjamin to the time of President Grant to today—that is, the challenge of each individual and family, through personal and collective study, to internalize the messages of the gospel of our Lord and Savior. Salvation is not in facilities or technology, but in the word. Only in the power of the word will it impact our lives and help us to live closer to our Father in Heaven.\n
      -L. Tom Perry" rotation="-12 0 0" scale="3 3 1"></a-entity>
      <a-image src="#my-image" scale="133 100 1" position="0 0 -40" material="" geometry=""></a-image>
      <a-plane position="-0.145 0.891 -4" rotation="-12 0 0" width="4" height="4" color="#7BC8A4" material="color:#000000;opacity:0.5" geometry="height:3.46"></a-plane> -->
      <!-- <a-sky src="#sky" material="" geometry=""></a-sky> -->
      <a-entity obj-model="obj: #temple;" position="-51.163 0 -15.972" rotation="-90 0 0"></a-entity>
      <a-entity obj-model="obj: #christus;" shadow="cast: true" position="-11.613 0 0" rotation="0 90 0" scale="0.05 0.05 0.05"></a-entity>
      <a-sky src="#sky"></a-sky>
      <a-entity gearvr-controls=""></a-entity>
      <a-entity rotation="-90 0 0" scale="1000 1000 1" shadow="receive: true" geometry="primitive:plane" material="color:#8dacaf"></a-entity>
      <a-entity position="-11.684 12.432 12.304" light="shadowCameraLeft:-10;shadowCameraRight:10;castShadow:true"></a-entity>
      <a-entity position="12.313 0 0" light="intensity:0.37999999999999995;type:ambient"></a-entity>
      <a-entity position="0.418 6.03 -9.207" light="intensity:0.2"></a-entity>
    </a-scene>
  </body>
</html>
